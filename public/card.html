<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#B8906A">

  <meta name="apple-mobile-web-app-title" content="Conexão Arq">
  <title>Cartão do Filiado – Conexão Arq Serra</title>
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/card.css">
</head>

<body class="card-body">

  <div id="loading" class="loading-screen">
    <div class="spinner"></div>
  </div>

  <div id="error" class="error-screen" style="display:none">
    <div class="error-icon">⚠</div>
    <h2>Cartão não encontrado</h2>
    <p>O link pode estar inválido ou expirado.</p>
  </div>

  <div id="card-container" class="card-container" style="display:none">

    <!-- Install banner -->
    <div id="install-banner" class="install-banner" style="display:none">
      <span>📲 Adicione à tela inicial para acesso rápido</span>
      <button id="install-btn" class="install-btn-cta">Instalar</button>
      <button id="install-close" class="install-close">✕</button>
    </div>

    <!-- Card wrapper with flip -->
    <div class="scene">
      <div class="card" id="member-card">

        <!-- ── FRENTE ── -->
        <div class="card-face card-front">
          <!-- Linhas de grade arquitetural decorativas -->
          <div class="arch-lines">
            <div class="arch-line arch-line-h1"></div>
            <div class="arch-line arch-line-h2"></div>
            <div class="arch-line arch-line-v1"></div>
          </div>

          <!-- Conteúdo da frente -->
          <div class="front-top">
            <img src="/images/logo.png" alt="Logo Conexão Arq Serra" class="front-logo">
            <div class="front-club-name">
              <span class="front-club-top">CONEXÃO</span>
              <span class="front-club-bottom">arq. <em>SERRA</em></span>
            </div>
          </div>

          <div class="front-divider"></div>

          <div class="front-bottom">
            <div class="front-label">FILIADO</div>
            <div class="front-name" id="member-nome">–</div>
            <div class="front-meta">
              <div class="front-meta-item">
                <span class="front-meta-label">Nº</span>
                <span class="front-meta-value" id="member-numero">–</span>
              </div>
              <div class="front-meta-sep">·</div>
              <div class="front-meta-item">
                <span class="front-meta-label">VÁLIDO ATÉ</span>
                <span class="front-meta-value" id="member-validade">–</span>
              </div>
            </div>
          </div>

          <div class="flip-hint" onclick="flipCard()">↺ ver verso</div>
        </div>

        <!-- ── VERSO ── -->
        <div class="card-face card-back">
          <div class="arch-lines">
            <div class="arch-line arch-line-h1"></div>
            <div class="arch-line arch-line-h2"></div>
            <div class="arch-line arch-line-v1"></div>
          </div>

          <div class="back-center">
            <img src="/images/logo.png" alt="Logo Conexão Arq Serra" class="back-logo">
            <p class="back-tagline">CLUBE DE BENEFÍCIOS</p>
          </div>

          <div class="flip-hint" onclick="flipCard()">↺ ver frente</div>
        </div>

      </div>
    </div>

    <!-- Status -->
    <div class="status-container">
      <div class="status-badge" id="status-badge">
        <span class="status-dot"></span>
        <span id="status-text">ATIVO</span>
      </div>
    </div>

    <!-- Share -->
    <div class="card-actions">
      <button class="action-btn" onclick="shareCard()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="18" cy="5" r="3" />
          <circle cx="6" cy="12" r="3" />
          <circle cx="18" cy="19" r="3" />
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
        </svg>
        Compartilhar cartão
      </button>

      <a href="https://site-conexao-arq-serra.vercel.app/empresas-participantes.html" class="action-btn" target="_blank"
        rel="noopener noreferrer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          <polyline points="15 3 21 3 21 9"></polyline>
          <line x1="10" y1="14" x2="21" y2="3"></line>
        </svg>
        Ver Parceiros
      </a>
    </div>

    <p class="footer-note">Conexão Arq Serra © 2026</p>
  </div>

  <script src="/js/card.js"></script>
</body>

</html>
